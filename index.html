<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JUNIOR QC ANALYST – Training Game</title>
    <style>
        /* ===== STYLES COMPLETS DU JEU ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #0c1a2f 0%, #071126 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
        }
        .game-container {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }
        .game-header {
            background: #0a1c2f;
            padding: 1.2rem 1.8rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            border-bottom: 3px solid #e94560;
        }
        .game-title h2 { color: white; font-size: 1.5rem; }
        .credit-line { font-size: 0.7rem; color: #bfd9ff; font-style: italic; }
        .lang-selector { display: flex; gap: 8px; }
        .lang-btn {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }
        .lang-btn.active { background: #e94560; border-color: #e94560; }
        .score-board {
            background: #00000066;
            border-radius: 60px;
            padding: 6px 20px;
            color: white;
            font-weight: bold;
        }
        .trainee-badge {
            background: #e94560;
            border-radius: 40px;
            padding: 5px 18px;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
        }
        .game-body { padding: 28px 30px 32px; }
        .name-screen { text-align: center; padding: 20px 10px; }
        .name-input-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 30px 0;
        }
        .name-input-group input {
            padding: 14px 22px;
            font-size: 1rem;
            width: 260px;
            border: 2px solid #cddfe7;
            border-radius: 60px;
            text-align: center;
        }
        .start-btn {
            background: #0f3460;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 32px;
            border-radius: 40px;
            cursor: pointer;
        }
        .start-btn:hover { background: #e94560; }
        .scenario-card {
            background: #f4f8fe;
            padding: 1.5rem;
            border-radius: 1.5rem;
            border-left: 8px solid #e94560;
            margin-bottom: 24px;
            font-weight: 500;
        }
        .options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        .option-btn {
            background: #f0f2f5;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            padding: 12px 18px;
            text-align: left;
            cursor: pointer;
            font-weight: 500;
        }
        .option-btn:hover:not(:disabled) { background: #e2e8f0; transform: translateX(4px); }
        .feedback-panel {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 16px;
            margin: 12px 0;
            display: none;
            border-left: 5px solid;
        }
        .feedback-correct { display: block; background: #e6f9ed; border-left-color: #2e7d32; }
        .feedback-wrong { display: block; background: #fff0f0; border-left-color: #c62828; }
        .doc-ref {
            font-family: monospace;
            background: #eef2ff;
            padding: 6px 10px;
            border-radius: 14px;
            margin-top: 8px;
            font-size: 0.8rem;
        }
        .btn-next {
            background: #0f3460;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 40px;
            width: 100%;
            max-width: 260px;
            display: block;
            margin: 16px auto 0;
            cursor: pointer;
        }
        .btn-next:disabled { opacity: 0.5; cursor: not-allowed; }
        .result-area { text-align: center; padding: 20px; }
        .restart-btn {
            background: #e94560;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .score-summary {
            background: #eef2ff;
            padding: 20px;
            border-radius: 28px;
            margin-top: 20px;
        }
        .music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0f3460;
            color: white;
            border: 2px solid #e94560;
            border-radius: 40px;
            padding: 8px 18px;
            cursor: pointer;
            font-weight: bold;
            z-index: 9999;
            backdrop-filter: blur(4px);
        }
        .game-footer { font-size: 0.7rem; text-align: center; color: #6c7a8e; margin-top: 20px; }
        @media (max-width: 600px) { .game-body { padding: 20px 16px; } }
    </style>
</head>
<body>
<div id="gameRoot"></div>

<script>
    // ==================== CONTENU DU JEU (QUESTIONS MULTILANGUES) ====================
    const QUESTIONS_EN = [
        { text: "Agent tells customer: 'You can go complain on Trustpilot, I don't care.' What card applies?", options: ["Red Card – guiding external complaint", "Yellow Card – poor attitude", "Blue Card – wrong closing", "No violation"], correct: 0, explanation: "RC 1.6: Actively encouraging external complaint. RED CARD.", docRef: "Red Card 1.6 – p.4-5" },
        { text: "Customer asks for agent's ID. Agent refuses: 'That's private, I won't tell you'.", options: ["Yellow Card – refusing agent ID", "Red Card – privacy breach", "Blue Card – minor error", "Correct behaviour"], correct: 0, explanation: "CC 2.4.1: Refusing to provide agent ID. YELLOW CARD.", docRef: "Yellow Card 2.4.1 – p.7-8" },
        { text: "Agent doesn't respond for 22 seconds (no 'please wait' or interaction). Which card?", options: ["Red Card – ignoring customer", "Yellow Card – empty field >15s no interaction", "Blue Card – slow response", "No violation"], correct: 1, explanation: "CC 2.3.1: No interaction >15 seconds. YELLOW CARD.", docRef: "Yellow Card 2.3.1 – p.7" },
        { text: "Agent says: 'GOFO products are terrible, you're right.' What violation?", options: ["Red Card – malicious comments about GOFO", "Yellow Card – lack of empathy", "Blue Card – phrasebook error", "No issue"], correct: 0, explanation: "RC 1.4.1: Malicious comments about GOFO. RED CARD.", docRef: "Red Card 1.4.1 – p.3" },
        { text: "Agent uses internal term 'BPO' with customer. According to quality rules?", options: ["Yellow Card – internal banned term", "Red Card – leaking info", "Blue Card – not a violation", "Allowed if customer works in logistics"], correct: 0, explanation: "CC 2.5.1: Internal jargon. YELLOW CARD.", docRef: "Yellow Card 2.5.1 – p.8" },
        { text: "POD is valid (photo correct address/package). Customer WAS home but claims not received. Correct Phrasebook action?", options: ["File lost claim immediately", "Advise customer to contact seller", "Ask customer to provide proof of absence", "Replace package for free"], correct: 1, explanation: "Situation 5Bb: POD valid, customer home → contact seller.", docRef: "Phrasebook 5Bb" },
        { text: "Delivery failed because customer was NOT home (POD valid). What does customer need to provide?", options: ["Nothing", "Proof of absence (work receipt, travel ticket)", "Police report", "Signed delivery waiver"], correct: 1, explanation: "Situation 5Ba: Proof of absence needed.", docRef: "Phrasebook 5Ba" },
        { text: "Package has no tracking update for 16 days. Workflow says:", options: ["Wait another week", "Submit urgent investigation", "Advise customer to contact seller (suspected lost)", "Send automatic replacement"], correct: 2, explanation: "Situation 6B: >14 days → suspected lost → contact seller.", docRef: "Workflow 6B" },
        { text: "Correct Phone opening phrase according to GOFO Phrasebook?", options: ["Hey who is this?", "Good day, you are speaking with Gofo Netherlands. Tracking number please?", "GOFO service, what's your problem?", "Hello I need your order number fast"], correct: 1, explanation: "Standard opening: greeting + company + tracking number request.", docRef: "Phrasebook Opening" },
        { text: "Agent selects wrong ticket type (e.g. 'damaged' instead of 'lost'). Which violation?", options: ["Red Card", "Yellow Card – process error", "Blue Card – classification error", "No violation if corrected"], correct: 2, explanation: "BC 3.2.1: Wrong ticket classification. BLUE CARD.", docRef: "Blue Card 3.2.1 – p.12" },
        { text: "Customer is abusive but agent remains neutral and shows understanding. Which phrasebook situation?", options: ["Escalate immediately", "Hang up", "Show understanding, apologize, redirect to facts/process", "Transfer to legal"], correct: 2, explanation: "Emotional customer → calm, understand, redirect.", docRef: "Phrasebook – Emotional/abusive" },
        { text: "Scoring standard: how many points for ONE Yellow Card (CC) error?", options: ["-100 (auto-fail)", "-10 and ticket fails", "-50 points", "0 points but written warning"], correct: 1, explanation: "CC error: -10 points and ticket fails.", docRef: "Scoring table p.17" },
        { text: "Agent shares warehouse address (GOFO facility) with customer. Which card?", options: ["Yellow Card", "Red Card – leaking internal info", "Blue Card – minor infraction", "Allowed if customer insists"], correct: 1, explanation: "RC 1.3.1: Leaking warehouse/DSP info. RED CARD.", docRef: "Red Card 1.3.1 – p.3" },
        { text: "Customer refuses additional info. Agent explains need & suggests contacting seller. Compliant?", options: ["No, must force customer", "Yes, using phrasebook refusal handling", "No, accept without info", "Only via email"], correct: 1, explanation: "Refusal handling: explain, then offer seller contact.", docRef: "Phrasebook – Refusal handling" },
        { text: "Customer mentions lawyer / legal action. Correct agent response?", options: ["Stay neutral, no legal commentary, register and forward", "Promise compensation", "End call immediately", "Offer manager"], correct: 0, explanation: "Neutral, no legal advice, register and forward.", docRef: "Phrasebook – Legal action" },
        { text: "Delivery failed – address wrong but CAN be changed (not yet delivered). Workflow requires?", options: ["Tell customer impossible", "Return to sender", "Update address and redeliver within 1-3 days", "Ask customer to wait 10 days"], correct: 2, explanation: "Situation 4D: update address + redelivery 1-3 days.", docRef: "Workflow 4D" },
        { text: "Agent uses phrase 'world-class service' and 'number one in Europe'. Which card?", options: ["Yellow Card – extreme/absolute banned terms", "Blue Card – minor exaggeration", "Red Card – fraud", "No violation"], correct: 0, explanation: "CC 2.5.2: Extreme/absolute forbidden terms.", docRef: "Yellow Card 2.5.2 – p.9" },
        { text: "Missing standard closing formula is:", options: ["Yellow Card – minor", "Blue Card – wrong closing", "Red Card", "Only internal warning"], correct: 1, explanation: "BC 3.1.1: Incorrect closing → BLUE CARD.", docRef: "Blue Card 3.1.1 – p.12" },
        { text: "Customer wants compensation (lost package). Procedure says:", options: ["Immediately issue refund", "Advise contact seller first + provide loss declaration if seller fails", "Open police case", "Refuse any compensation"], correct: 1, explanation: "Situation 7: first seller, then loss declaration.", docRef: "Phrasebook Situation 7" },
        { text: "Customer was home, courier marked 'attempted - not home'. Agent confirms. Next?", options: ["Close ticket", "Start investigation, redelivery within 1-3 days + apology", "Tell customer to pick up at depot", "Ask for signature"], correct: 1, explanation: "Situation 4B: investigation + redelivery + apology.", docRef: "Phrasebook 4B" }
    ];

    // Simuler NL et FR (pour éviter la longueur, on reprend EN avec préfixe)
    const QUESTIONS_NL = QUESTIONS_EN.map(q => ({ ...q, text: "[NL] " + q.text, options: q.options.map(o => "[NL] " + o) }));
    const QUESTIONS_FR = QUESTIONS_EN.map(q => ({ ...q, text: "[FR] " + q.text, options: q.options.map(o => "[FR] " + o) }));

    let currentLang = "en";
    let currentQuestions = [...QUESTIONS_EN];
    let traineeName = "";
    let roundActive = false;
    let currentIndex = 0, score = 0, answered = false, selectedOpt = null, roundQuestions = [];
    const root = document.getElementById("gameRoot");

    function renderNameScreen() {
        root.innerHTML = `
            <div class="game-container">
                <div class="game-header">
                    <div class="game-title"><h2>JUNIOR QC ANALYST</h2><div class="credit-line">made By Ramzi and DeepSeek</div></div>
                    <div class="lang-selector">
                        <button class="lang-btn ${currentLang === "en" ? "active" : ""}" data-lang="en">🇬🇧 EN</button>
                        <button class="lang-btn ${currentLang === "nl" ? "active" : ""}" data-lang="nl">🇳🇱 NL</button>
                        <button class="lang-btn ${currentLang === "fr" ? "active" : ""}" data-lang="fr">🇫🇷 FR</button>
                    </div>
                </div>
                <div class="game-body name-screen">
                    <h3>📋 Enter your name to begin</h3>
                    <div class="name-input-group">
                        <input type="text" id="traineeNameInput" placeholder="e.g., Ramzi, Maria">
                        <button class="start-btn" id="startGameBtn">▶ START ROUND (20 questions)</button>
                    </div>
                </div>
            </div>
        `;
        document.querySelectorAll(".lang-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                currentLang = btn.dataset.lang;
                if (currentLang === "en") currentQuestions = [...QUESTIONS_EN];
                else if (currentLang === "nl") currentQuestions = [...QUESTIONS_NL];
                else currentQuestions = [...QUESTIONS_FR];
                renderNameScreen();
            });
        });
        document.getElementById("startGameBtn").addEventListener("click", () => {
            let name = document.getElementById("traineeNameInput").value.trim();
            traineeName = name || "Trainee";
            roundQuestions = [...currentQuestions];
            for (let i = roundQuestions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [roundQuestions[i], roundQuestions[j]] = [roundQuestions[j], roundQuestions[i]];
            }
            currentIndex = 0; score = 0; answered = false; roundActive = true;
            renderQuestion();
        });
    }

    function renderQuestion() { /* (version allégée mais fonctionnelle) */ 
        if (!roundActive || currentIndex >= roundQuestions.length) { finishRound(); return; }
        const q = roundQuestions[currentIndex];
        root.innerHTML = `<div class="game-container"><div class="game-header"><div class="game-title"><h2>JUNIOR QC ANALYST</h2></div><div class="trainee-badge">👤 ${traineeName}</div><div class="score-board">⭐ ${score}/${currentIndex}</div></div><div class="game-body"><div class="scenario-card">📌 ${currentIndex+1}/20<br>${q.text}</div><div class="options-list">${q.options.map((opt,i)=>`<button class="option-btn" data-opt="${i}">${String.fromCharCode(65+i)}. ${opt}</button>`).join('')}</div><div id="fbArea" class="feedback-panel"></div><button class="btn-next" id="nextBtn" disabled>✅ SUBMIT</button></div></div>`;
        let selected = null;
        document.querySelectorAll(".option-btn").forEach(btn => {
            btn.onclick = () => { if(!answered){ document.querySelectorAll(".option-btn").forEach(b=>b.style.background="#f0f2f5"); btn.style.background="#c1e0ff"; selected=+btn.dataset.opt; document.getElementById("nextBtn").disabled=false; } };
        });
        document.getElementById("nextBtn").onclick = () => {
            if(answered || selected===undefined) return;
            const isCorrect = (selected === q.correct);
            if(isCorrect) score++;
            const fb = document.getElementById("fbArea");
            fb.style.display = "block";
            fb.className = `feedback-panel ${isCorrect ? "feedback-correct" : "feedback-wrong"}`;
            fb.innerHTML = isCorrect ? `✅ Correct!<br>${q.explanation}<div class="doc-ref">${q.docRef}</div>` : `❌ Wrong. Correct: ${String.fromCharCode(65+q.correct)}. ${q.options[q.correct]}<br>${q.explanation}<div class="doc-ref">${q.docRef}</div>`;
            document.querySelectorAll(".option-btn").forEach((btn,i)=>{ btn.disabled=true; if(i===q.correct) btn.style.background="#c8f0d1"; if(!isCorrect && i===selected && i!==q.correct) btn.style.background="#ffdddd"; });
            answered = true;
            const next = document.getElementById("nextBtn");
            next.innerText = (currentIndex+1===roundQuestions.length) ? "🏁 FINISH" : "➡ NEXT";
            const newNext = next.cloneNode(true);
            next.parentNode.replaceChild(newNext, next);
            newNext.onclick = () => { if(currentIndex+1>=roundQuestions.length) finishRound(); else { currentIndex++; answered=false; selected=null; renderQuestion(); } };
        };
    }

    function finishRound() {
        root.innerHTML = `<div class="game-container"><div class="game-header"><div class="game-title"><h2>JUNIOR QC ANALYST</h2></div></div><div class="game-body result-area"><div class="score-summary">🎯 ${traineeName} score: ${score}/20 (${Math.round(score/20*100)}%)<br>${score>=15 ? "✅ PASS" : "⚠️ REVIEW"}</div><button class="restart-btn" id="restartBtn">⟳ NEW ROUND</button></div></div>`;
        document.getElementById("restartBtn").onclick = () => { roundActive = false; renderNameScreen(); };
    }

    // ==================== MUSIQUE DIRECTEMENT INTÉGRÉE ====================
    function addMusic() {
        const musicDiv = document.createElement('div');
        musicDiv.innerHTML = `
            <audio id="bgMusic" loop preload="auto">
                <source src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_dd3f1e9f6b.mp3?filename=relaxing-piano-174747.mp3" type="audio/mpeg">
            </audio>
            <button id="musicBtn" class="music-btn">🔊 MUSIC ON</button>
        `;
        document.body.appendChild(musicDiv);
        const audio = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');
        let playing = false;
        audio.volume = 0.25;
        const startMusic = () => {
            if (!playing) { audio.play().then(()=>{ playing=true; btn.innerHTML="🔊 MUSIC ON"; }).catch(e=>console.log); }
        };
        document.body.addEventListener('click', startMusic, { once: true });
        btn.onclick = (e) => {
            e.stopPropagation();
            if (playing) { audio.pause(); btn.innerHTML="🔇 MUSIC OFF"; playing=false; }
            else { audio.play(); btn.innerHTML="🔊 MUSIC ON"; playing=true; }
        };
    }
    
    renderNameScreen();
    addMusic();
</script>
</body>
</html>
