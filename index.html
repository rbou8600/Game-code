<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JUNIOR QC ANALYST – Multilingual Training Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0c1a2f 0%, #071126 100%);
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
        }

        .game-container {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        .game-header {
            background: #0a1c2f;
            padding: 1.2rem 1.8rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            border-bottom: 3px solid #e94560;
        }

        .game-title h2 {
            color: white;
            font-size: 1.5rem;
            letter-spacing: -0.3px;
            font-weight: 800;
        }
        .credit-line {
            font-size: 0.7rem;
            color: #bfd9ff;
            font-style: italic;
        }

        .lang-selector {
            display: flex;
            gap: 8px;
            background: #071126aa;
            padding: 6px 12px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }
        .lang-btn {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .lang-btn.active {
            background: #e94560;
            border-color: #e94560;
        }

        .score-board {
            background: #00000066;
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 6px 20px;
            color: white;
            font-weight: bold;
            font-family: monospace;
        }

        .trainee-badge {
            background: #e94560;
            border-radius: 40px;
            padding: 5px 18px;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
        }

        .game-body {
            padding: 28px 30px 32px;
        }

        .name-screen {
            text-align: center;
            padding: 20px 10px;
        }
        .name-input-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 30px 0;
        }
        .name-input-group input {
            padding: 14px 22px;
            font-size: 1rem;
            width: 260px;
            border: 2px solid #cddfe7;
            border-radius: 60px;
            text-align: center;
        }
        .start-btn {
            background: #0f3460;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 32px;
            border-radius: 40px;
            cursor: pointer;
        }
        .start-btn:hover { background: #e94560; }

        .scenario-card {
            background: #f4f8fe;
            padding: 1.5rem;
            border-radius: 1.5rem;
            border-left: 8px solid #e94560;
            margin-bottom: 24px;
            font-weight: 500;
            line-height: 1.4;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        .option-btn {
            background: #f0f2f5;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            padding: 12px 18px;
            text-align: left;
            cursor: pointer;
            font-weight: 500;
        }
        .option-btn:hover:not(:disabled) {
            background: #e2e8f0;
            transform: translateX(4px);
        }

        .feedback-panel {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 16px;
            margin: 12px 0;
            display: none;
            border-left: 5px solid;
        }
        .feedback-correct { display: block; background: #e6f9ed; border-left-color: #2e7d32; }
        .feedback-wrong { display: block; background: #fff0f0; border-left-color: #c62828; }
        .doc-ref {
            font-family: monospace;
            background: #eef2ff;
            padding: 6px 10px;
            border-radius: 14px;
            margin-top: 8px;
            font-size: 0.8rem;
        }
        .btn-next {
            background: #0f3460;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 40px;
            width: 100%;
            max-width: 260px;
            display: block;
            margin: 16px auto 0;
            cursor: pointer;
        }
        .btn-next:disabled { opacity: 0.5; cursor: not-allowed; }
        .result-area { text-align: center; padding: 20px; }
        .restart-btn {
            background: #e94560;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            margin-top: 20px;
            cursor: pointer;
        }
        .score-summary {
            background: #eef2ff;
            padding: 20px;
            border-radius: 28px;
            margin-top: 20px;
        }
        .game-footer {
            font-size: 0.7rem;
            text-align: center;
            color: #6c7a8e;
            margin-top: 20px;
        }
        @media (max-width: 600px) {
            .game-body { padding: 20px 16px; }
            .game-header { flex-direction: column; align-items: stretch; }
        }

        /* ── Profile Card ── */
        .profile-card-wrap{position:relative;border-radius:18px;overflow:hidden;max-width:640px;margin:0 auto 20px;min-height:230px;background:#0d1117}
        .pc-bg{position:absolute;inset:0}
        .pc-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(30,200,120,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(30,200,120,.07) 1px,transparent 1px);background-size:28px 28px}
        .pc-corner{position:absolute;width:18px;height:18px;border-color:#1ec878;border-style:solid;opacity:.55}
        .pc-tl{top:10px;left:10px;border-width:2px 0 0 2px}.pc-tr{top:10px;right:10px;border-width:2px 2px 0 0}
        .pc-bl{bottom:10px;left:10px;border-width:0 0 2px 2px}.pc-br{bottom:10px;right:10px;border-width:0 2px 2px 0}
        .pc-scanbar{position:absolute;inset:0;background:linear-gradient(180deg,transparent 0%,rgba(30,200,120,.04) 50%,transparent 100%);animation:pcScan 4s ease-in-out infinite}
        @keyframes pcScan{0%,100%{opacity:.3}50%{opacity:1}}
        .pc-inner{position:relative;z-index:2;display:flex;align-items:stretch;min-height:230px}
        .pc-photo-col{width:170px;flex-shrink:0;position:relative;overflow:hidden}
        .pc-photo-col img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;filter:contrast(1.05) saturate(.8)}
        .pc-photo-overlay{position:absolute;inset:0;background:linear-gradient(to right,transparent 55%,#0d1117 100%),linear-gradient(to bottom,transparent 65%,#0d111788 100%)}
        .pc-scanline{position:absolute;left:0;right:0;height:2px;background:rgba(30,200,120,.35);animation:pcScanLine 3s linear infinite}
        @keyframes pcScanLine{0%{top:-2px}100%{top:100%}}
        .pc-verified{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(30,200,120,.12);border:1px solid rgba(30,200,120,.45);border-radius:20px;padding:3px 10px;font-size:9px;font-weight:600;letter-spacing:2px;color:#1ec878;white-space:nowrap}
        .pc-info-col{flex:1;padding:16px 18px 12px 14px;display:flex;flex-direction:column;justify-content:space-between}
        .pc-company-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
        .pc-dot{width:7px;height:7px;border-radius:50%;background:#1ec878;box-shadow:0 0 5px #1ec878;flex-shrink:0}
        .pc-company{font-size:9px;letter-spacing:2.5px;color:rgba(255,255,255,.3);text-transform:uppercase}
        .pc-role{font-size:22px;font-weight:800;color:#fff;line-height:1.1;margin-bottom:3px}
        .pc-role-sub{font-size:8px;color:#1ec878;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
        .pc-divider{height:1px;background:linear-gradient(to right,rgba(30,200,120,.3),transparent);margin-bottom:10px}
        .pc-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
        .pc-stat{background:rgba(255,255,255,.04);border:1px solid rgba(30,200,120,.12);border-radius:7px;padding:6px 8px}
        .pc-stat-label{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:2px}
        .pc-stat-val{font-size:14px;font-weight:800;color:#1ec878}
        .pc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
        .pc-tag{font-size:8px;letter-spacing:1px;padding:2px 8px;border-radius:20px;border:1px solid rgba(30,200,120,.2);color:rgba(255,255,255,.4);text-transform:uppercase}
        .pc-tag.active{background:rgba(30,200,120,.1);border-color:rgba(30,200,120,.45);color:#1ec878}
        .pc-idrow{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid rgba(255,255,255,.05)}
        .pc-idcode{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.2)}
        .pc-status-row{display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:rgba(30,200,120,.7)}
        .pc-pulse{width:6px;height:6px;border-radius:50%;background:#1ec878;animation:pcPulse 1.5s ease-in-out infinite;display:inline-block}
        @keyframes pcPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.65)}}
        /* Weihu logo footer */
        .weihu-footer{text-align:center;padding:16px 0 4px;border-top:1px solid #e8edf3;margin-top:8px}
        .weihu-footer img{height:38px;opacity:.85}
        @media(max-width:500px){.pc-photo-col{width:120px}.pc-role{font-size:17px}}
    </style>
</head>

        { text: "Agent tells customer: 'You can go complain on Trustpilot, I don't care.' What card applies?", options: ["Red Card – guiding external complaint", "Yellow Card – poor attitude", "Blue Card – wrong closing", "No violation"], correct: 0, explanation: "RC 1.6: Actively encouraging external complaint. RED CARD.", docRef: "Red Card 1.6 – p.4-5" },

        document.querySelectorAll(".lang-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                currentLang = btn.dataset.lang;
                if (currentLang === "en") currentQuestions = [...QUESTIONS_EN];
                else if (currentLang === "nl") currentQuestions = [...QUESTIONS_NL];
                else if (currentLang === "fr") currentQuestions = [...QUESTIONS_FR];
                else if (currentLang === "it") currentQuestions = [...QUESTIONS_IT];
                else if (currentLang === "zh") currentQuestions = [...QUESTIONS_ZH];
                renderNameScreen();
            });
        });
        document.getElementById("startGameBtn").addEventListener("click", () => {
            let name = document.getElementById("traineeNameInput").value.trim();
            traineeName = name || "Trainee";
            roundQuestions = [...currentQuestions];
            for (let i = roundQuestions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [roundQuestions[i], roundQuestions[j]] = [roundQuestions[j], roundQuestions[i]];
            }
            currentIndex = 0; score = 0; answered = false; selectedOpt = null; roundActive = true;
            renderQuestion();
        });

    function renderQuestion() {
        if (!roundActive || currentIndex >= roundQuestions.length) { finishRound(); return; }
        const q = roundQuestions[currentIndex];
        const optsHtml = q.options.map((opt, idx) => `<button class="option-btn" data-opt="${idx}">${String.fromCharCode(65+idx)}. ${escapeHtml(opt)}</button>`).join('');
        root.innerHTML = `
            <div class="game-container">
                <div class="game-header">
                    <div class="game-title"><h2>${getLangText("appTitle")}</h2><div class="credit-line">${getLangText("credit")}</div></div>
                    <div class="trainee-badge">${getLangText("traineeLabel")} ${escapeHtml(traineeName)}</div>
                    <div class="score-board">⭐ ${score}/${currentIndex}</div>
                </div>
                <div class="game-body">
                    <div class="scenario-card">📌 <strong>${currentIndex+1}/${roundQuestions.length}</strong><br>${escapeHtml(q.text)}</div>
                    <div class="options-list" id="optsList">${optsHtml}</div>
                    <div id="fbArea" class="feedback-panel" style="display:none;"></div>
                    <button class="btn-next" id="nextBtn" disabled>${getLangText("submitBtn")}</button>
                    <div class="game-footer">🔍 Select an answer, then validate.</div>
                </div>
            </div>
        `;
        let selected = null;
        document.querySelectorAll(".option-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                if (answered) return;
                document.querySelectorAll(".option-btn").forEach(b => { b.style.background = "#f0f2f5"; });
                btn.style.background = "#c1e0ff";
                selected = parseInt(btn.dataset.opt);
                document.getElementById("nextBtn").disabled = false;
            });
        });
        document.getElementById("nextBtn").addEventListener("click", () => {
            if (answered || selected === undefined) return;
            const qq = roundQuestions[currentIndex];
            const isCorrect = (selected === qq.correct);
            if (isCorrect) score++;
            const fbDiv = document.getElementById("fbArea");
            const correctLetter = String.fromCharCode(65+qq.correct);
            if (isCorrect) {
                fbDiv.innerHTML = `<strong>${getLangText("correctFeedback")}</strong><br>${escapeHtml(qq.explanation)}<div class="doc-ref">📄 ${escapeHtml(qq.docRef)}</div>`;
                fbDiv.className = "feedback-panel feedback-correct";
            } else {
                fbDiv.innerHTML = `<strong>${getLangText("wrongFeedback")}</strong><br>${getLangText("yourChoice")}: ${String.fromCharCode(65+selected)}. ${escapeHtml(qq.options[selected])}<br>${getLangText("correctAnswer")}: ${correctLetter}. ${escapeHtml(qq.options[qq.correct])}<br><br>${escapeHtml(qq.explanation)}<div class="doc-ref">📄 ${escapeHtml(qq.docRef)}</div>`;
                fbDiv.className = "feedback-panel feedback-wrong";
            }
            fbDiv.style.display = "block";
            document.querySelectorAll(".option-btn").forEach((btn, idx) => {
                btn.disabled = true;
                if (idx === qq.correct) { btn.style.background = "#c8f0d1"; }
                if (!isCorrect && idx === selected && idx !== qq.correct) { btn.style.background = "#ffdddd"; }
            });
            answered = true;
            const nextBtn = document.getElementById("nextBtn");
            nextBtn.innerText = (currentIndex+1 === roundQuestions.length) ? getLangText("finishBtn") : getLangText("nextBtn");
            const newNext = nextBtn.cloneNode(true);
            nextBtn.parentNode.replaceChild(newNext, nextBtn);
            newNext.addEventListener("click", () => {
                if (currentIndex+1 >= roundQuestions.length) finishRound();
                else { currentIndex++; answered = false; selected = undefined; renderQuestion(); }
            });
        });
    }

    function finishRound() {
        const total = roundQuestions.length;
        root.innerHTML = `
            <div class="game-container">
                <div class="game-header"><div class="game-title"><h2>${getLangText("appTitle")}</h2><div class="credit-line">${getLangText("credit")}</div></div></div>
                <div class="game-body result-area">
                    <div class="score-summary">🎯 <strong>${escapeHtml(traineeName)}</strong> ${getLangText("finalScoreMsg")} <strong style="font-size:2rem;">${score}</strong> ${getLangText("upTo")} ${total}.<br>(${score}/${total} · ${Math.round(score/total*100)}%)<br>${score >= 15 ? getLangText("passMsg") : getLangText("failMsg")}</div>
                    <button class="restart-btn" id="restartBtn">${getLangText("newRound")}</button>
                </div>
                <div class="game-footer">JUNIOR QC ANALYST • multilingual</div>
            </div>
        `;
        document.getElementById("restartBtn").addEventListener("click", () => { roundActive = false; renderNameScreen(); });
    }

    function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    renderNameScreen();
</script>
</body>
